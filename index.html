<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div id="calculator">
       <div id="display">
         <div id="display-main"></div>
       </div>
       <div id="buttons">
        <button data-type="action" class="button" id="on-off">ON/OFF</button>
        <button data-type="action" class="button" id="reset">AC</button>
        <button data-type="action" class="button" id="backspace">&#9003;</button>
        <button data-type="operator" class="button" id="plus">+</button>
        <button data-type="number" class="button" id="seven">7</button>
        <button data-type="number" class="button" id="eight">8</button>
        <button data-type="number" class="button" id="nine">9</button>
        <button data-type="operator" class="button" id="minus">-</button>
        <button data-type="number" class="button" id="four">4</button>
        <button data-type="number" class="button" id="five">5</button>
        <button data-type="number" class="button" id="six">6</button>
        <button data-type="operator" class="button" id="division">/</button>
        <button data-type="number" class="button" id="one">1</button>
        <button data-type="number" class="button" id="two">2</button>
        <button data-type="number" class="button" id="three">3</button>
        <button data-type="operator" class="button" id="mult">*</button>
        <button data-type="number" class="button" id="zero">0</button>
        <button data-type="decimal" class="button" id="dot">.</button>
        <button data-type="operator" class="button" id ="equals">=</button>
       </div> 
    </div>
    <script src="script.js" defer></script>
</body>
</html>
